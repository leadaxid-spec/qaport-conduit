name: Execute Automation Tests
on: [push]

jobs:
  automation-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project code
        uses: actions/checkout@v4

      - name: Initialize Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install Playwright Browser and Linux Dependencies
        run: |
          poetry run playwright install chromium
          poetry run playwright install-deps chromium

      - name: Start Mock Backend
        run: docker compose up -d

      - name: Wait for Backend readiness
        run: sleep 3

      - name: Execute PyTest suite
        run: poetry run pytest -s -v

      - name: Stop Infrastructure
        if: always()
        run: docker compose down

      - name: Upload UI Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: github_home.png
          retention-days: 7